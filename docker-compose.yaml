version: '2.3'
services:
  xserver:
    image: devrt/xserver
    ipc: host
    security_opt:
      - seccomp:unconfined
    ports:
      - "12345:80"
    healthcheck:
      test: [ "CMD-SHELL", "test -e /tmp/.X11-unix/X0" ]
      interval: "1s"
      retries: 20
  workspace:
    image: ghcr.io/jkaflik/openmowerros2:main
    build:
      context: .
      dockerfile: Dockerfile
    ipc: host
    privileged: true
    security_opt:
      - seccomp:unconfined
    volumes:
      - /dev:/dev
      - build:/home/ws/build # keep container pre-build
      - install:/home/ws/install # keep container pre-build
      - log:/home/ws/log # keep container pre-build
      - ./foxglove_teleop_relay.py:/opt/ws/foxglove_teleop_relay.py
      - ./ackermann_hils_bridge.py:/opt/ws/ackermann_hils_bridge.py
      - ./test_snake_path.py:/opt/ws/test_snake_path.py
      - ./mower_action_client.py:/opt/ws/mower_action_client.py
      - ./launch/sim.launch.py:/opt/ws/install/open_mower_next/share/open_mower_next/launch/sim.launch.py
    environment:
      - DISPLAY=:0
      - ROS_LOCALHOST_ONLY=1
      - ROS_DOMAIN_ID=42
      - OM_DATUM_LAT=0.0
      - OM_DATUM_LONG=0.0
      - OM_MAP_PATH=/opt/ws/map.geojson
    ports:
      - "8765:8765"
    command: bash -c "python3 -m pip install pyserial transforms3d --break-system-packages || true && source /opt/ros/jazzy/setup.bash && source install/setup.bash && (python3 /opt/ws/foxglove_teleop_relay.py &) && (python3 /opt/ws/ackermann_hils_bridge.py &) && ros2 launch open_mower_next sim.launch.py"
    volumes_from:
      - xserver
    depends_on:
      - xserver
volumes:
  build:
  install:
  log:
